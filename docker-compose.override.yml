# 本地定制覆盖层 — 所有二次开发的改动放这里，不动 docker-compose.yml
# Docker Compose 启动时会自动合并本文件，无需额外参数。
#
# ⚠️  生产部署前必须修改：
#   - WATCHTOWER_API_TOKEN / WATCHTOWER_HTTP_API_TOKEN（两处保持一致）

services:
  new-api:
    image: crpi-xzr81d0490mc3794.cn-shanghai.personal.cr.aliyuncs.com/reputationly/new-api:latest
    environment:
      # 在线升级（Watchtower）：必须与 watchtower 服务的 WATCHTOWER_HTTP_API_TOKEN 一致
      - WATCHTOWER_API_TOKEN=CHANGE_ME_TO_RANDOM_TOKEN
      - WATCHTOWER_API_URL=http://watchtower:8080
    depends_on:
      - watchtower

  redis:
    image: crpi-xzr81d0490mc3794.cn-shanghai.personal.cr.aliyuncs.com/reputationly/redis:latest

  postgres:
    image: crpi-xzr81d0490mc3794.cn-shanghai.personal.cr.aliyuncs.com/reputationly/postgres:15

  # 在线升级服务（API-only 模式，不自动轮询）
  # 在 Web UI「设置 → 其他设置 → 检查更新」点「立即安装」时调用
  watchtower:
    image: crpi-xzr81d0490mc3794.cn-shanghai.personal.cr.aliyuncs.com/reputationly/watchtower:latest
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json   # ACR 登录凭证，用于拉私有镜像
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=CHANGE_ME_TO_RANDOM_TOKEN  # ⚠️ 必须与 new-api 的 WATCHTOWER_API_TOKEN 一致
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
    networks:
      - new-api-network
